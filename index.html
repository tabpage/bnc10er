<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পরীক্ষার ড্যাশবোর্ড - বি এন স্কুল এন্ড কলেজ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans Bengali', sans-serif;
        }

        .active-mode {
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
            border: 2px solid #ef4444;
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .exam-running-row {
            background-color: #fef2f2 !important;
            border-left: 4px solid #ef4444;
        }
        
        .timer-unit-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            padding: 1rem;
            border-radius: 1rem;
            min-width: 80px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">

    <nav class="bg-blue-900 text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-3">
                    <span class="text-2xl">⚓</span>
                    <h1 class="font-bold text-lg md:text-xl">বি এন স্কুল এন্ড কলেজ, খুলনা</h1>
                </div>
                <div id="live-indicator" class="hidden items-center gap-2 bg-red-600 px-3 py-1 rounded-full animate-pulse">
                    <span class="w-2 h-2 bg-white rounded-full"></span>
                    <span class="text-xs font-bold uppercase tracking-tighter">Live Exam</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-8 space-y-8">
        
        <!-- Main Countdown Card -->
        <section id="main-timer-card" class="bg-blue-900 text-white rounded-3xl p-8 shadow-xl flex flex-col items-center text-center relative overflow-hidden transition-all duration-500">
            <div class="relative z-10 w-full">
                <p class="text-blue-200 text-sm font-medium tracking-wide mb-2" id="timer-label">পরবর্তী পরীক্ষা</p>
                <h3 id="next-exam-name" class="text-3xl md:text-5xl font-bold mb-8">লোড হচ্ছে...</h3>
                
                <div id="countdown-grid" class="flex flex-wrap justify-center gap-4 md:gap-6">
                    <div class="timer-unit-box">
                        <div id="cd-days" class="text-3xl md:text-4xl font-bold">00</div>
                        <span class="text-[10px] opacity-70 uppercase font-semibold">দিন</span>
                    </div>
                    <div class="timer-unit-box">
                        <div id="cd-hours" class="text-3xl md:text-4xl font-bold">00</div>
                        <span class="text-[10px] opacity-70 uppercase font-semibold">ঘণ্টা</span>
                    </div>
                    <div class="timer-unit-box">
                        <div id="cd-mins" class="text-3xl md:text-4xl font-bold">00</div>
                        <span class="text-[10px] opacity-70 uppercase font-semibold">মিনিট</span>
                    </div>
                    <div class="timer-unit-box bg-white text-blue-900">
                        <div id="cd-secs" class="text-3xl md:text-4xl font-bold">00</div>
                        <span class="text-[10px] opacity-70 uppercase font-semibold">সেকেন্ড</span>
                    </div>
                </div>
                <p id="exam-status-desc" class="mt-8 text-blue-100 font-medium opacity-90"></p>
            </div>
            <!-- Decorative Background Element -->
            <div class="absolute right-[-20px] bottom-[-20px] opacity-5 text-9xl pointer-events-none select-none">⚓</div>
        </section>

        <!-- Routine Table Section -->
        <section class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-6 bg-slate-50 border-b border-slate-200 flex flex-col md:flex-row justify-between items-center gap-4">
                <h3 class="font-bold text-xl text-slate-800">পরীক্ষার সময়সূচি ২০২৬</h3>
                <div class="relative w-full md:w-72">
                    <input type="text" id="searchInput" placeholder="বিষয় দিয়ে সার্চ করুন..." class="w-full px-5 py-2.5 rounded-2xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-shadow text-sm">
                </div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-slate-500 text-[11px] uppercase font-bold border-b border-slate-100">
                        <tr>
                            <th class="py-5 px-8">তারিখ ও বার</th>
                            <th class="py-5 px-8">পরীক্ষার বিষয়</th>
                            <th class="py-5 px-8 text-center">অবস্থা</th>
                        </tr>
                    </thead>
                    <tbody id="routineTableBody" class="divide-y divide-slate-100">
                        <!-- Content generated by JS -->
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <footer class="py-12 text-center text-slate-400 text-sm">
        <p>© ২০২৬ বাংলাদেশ নৌবাহিনী স্কুল এন্ড কলেজ, খুলনা</p>
        <p class="mt-1 font-light italic">১০ম শ্রেণি প্রস্তুতিমূলক পরীক্ষা</p>
    </footer>

    <script>
        const routineData = [
            { date: '২৩/০৪/২৬', day: 'বৃহস্পতিবার', subject: 'বাংলা-০১', s: new Date(2026,3,23,14,0), e: new Date(2026,3,23,15,30) },
            { date: '২৬/০৪/২৬', day: 'রবিবার', subject: 'বাংলা-০২', s: new Date(2026,3,26,14,0), e: new Date(2026,3,26,15,30) },
            { date: '২৮/০৪/২৬', day: 'মঙ্গলবার', subject: 'ইংরেজি-০১', s: new Date(2026,3,28,14,0), e: new Date(2026,3,28,15,30) },
            { date: '৩০/০৪/২৬', day: 'বৃহস্পতিবার', subject: 'ইংরেজি-০২', s: new Date(2026,3,30,14,0), e: new Date(2026,3,30,15,30) },
            { date: '০৩/০৫/২৬', day: 'রবিবার', subject: 'গণিত', s: new Date(2026,4,3,14,0), e: new Date(2026,4,3,15,30) },
            { date: '০৫/০৫/২৬', day: 'মঙ্গলবার', subject: 'জীব / ব্যঃ উঃ / ইতিহাস', s: new Date(2026,4,5,14,0), e: new Date(2026,4,5,15,30) },
            { date: '০৭/০৫/২৬', day: 'বৃহস্পতিবার', subject: 'রসায়ন / হিসাব / ভূগোল', s: new Date(2026,4,7,14,0), e: new Date(2026,4,7,15,30) },
            { date: '১০/০৫/২৬', day: 'রবিবার', subject: 'পদার্থ / ফিন্যান্স / পৌরনীতি', s: new Date(2026,4,10,14,0), e: new Date(2026,4,10,15,30) },
            { date: '১১/০৫/২৬', day: 'সোমবার', subject: 'ধর্ম', s: new Date(2026,4,11,14,0), e: new Date(2026,4,11,15,30) },
            { date: '১২/০৫/২৬', day: 'মঙ্গলবার', subject: 'বাংলাদেশ ও বিশ্বপরিচয়', s: new Date(2026,4,12,14,0), e: new Date(2026,4,12,15,30) },
            { date: '১৩/০৫/২৬', day: 'বুধবার', subject: 'আইসিটি', s: new Date(2026,4,13,14,0), e: new Date(2026,4,13,15,30) },
            { date: '১৪/০৫/২৬', day: 'বৃহস্পতিবার', subject: 'উঃ গণিত / কৃষি', s: new Date(2026,4,14,14,0), e: new Date(2026,4,14,15,30) }
        ];

        function renderTable(data) {
            const tbody = document.getElementById('routineTableBody');
            tbody.innerHTML = '';
            const now = new Date();
            let foundNext = false;

            data.forEach(item => {
                let status = '<span class="text-slate-300 font-medium">আসন্ন</span>';
                let rowStyle = "";

                if (now > item.e) {
                    status = '<span class="text-emerald-500 font-bold text-xs flex items-center justify-center gap-1">✓ সম্পন্ন</span>';
                } else if (now >= item.s && now <= item.e) {
                    status = '<span class="bg-red-500 text-white px-3 py-1 rounded-full text-[9px] font-black uppercase animate-pulse">Running</span>';
                    rowStyle = "exam-running-row";
                } else if (!foundNext && now < item.s) {
                    status = '<span class="text-blue-600 font-bold text-xs">পরবর্তী</span>';
                    rowStyle = "bg-blue-50/50";
                    foundNext = true;
                }

                tbody.innerHTML += `
                    <tr class="${rowStyle} transition-all duration-300 hover:bg-slate-50/50">
                        <td class="py-5 px-8">
                            <div class="font-bold text-slate-700">${item.date}</div>
                            <div class="text-[10px] text-slate-400 mt-1">${item.day}</div>
                        </td>
                        <td class="py-5 px-8 font-bold text-blue-900">${item.subject}</td>
                        <td class="py-5 px-8 text-center">${status}</td>
                    </tr>
                `;
            });
        }

        function updateCountdown() {
            const now = new Date();
            const timerCard = document.getElementById('main-timer-card');
            const liveBadge = document.getElementById('live-indicator');
            
            let current = routineData.find(e => now >= e.s && now <= e.e);
            let next = routineData.find(e => now < e.s);
            let target = current ? current.e : (next ? next.s : null);

            if (current) {
                timerCard.className = "bg-red-600 text-white rounded-3xl p-8 shadow-2xl flex flex-col items-center text-center relative overflow-hidden active-mode";
                document.getElementById('timer-label').textContent = "পরীক্ষা বর্তমানে চলছে";
                document.getElementById('next-exam-name').textContent = current.subject;
                document.getElementById('exam-status-desc').textContent = "সময় শেষ হতে আর বাকি...";
                liveBadge.classList.remove('hidden');
                liveBadge.classList.add('flex');
            } else if (next) {
                timerCard.className = "bg-blue-900 text-white rounded-3xl p-8 shadow-xl flex flex-col items-center text-center relative overflow-hidden transition-all duration-500";
                document.getElementById('timer-label').textContent = "পরবর্তী পরীক্ষা";
                document.getElementById('next-exam-name').textContent = next.subject;
                document.getElementById('exam-status-desc').textContent = `${next.date} — ${next.day}`;
                liveBadge.classList.add('hidden');
            } else {
                document.getElementById('timer-label').textContent = "সবগুলো পরীক্ষা শেষ";
                document.getElementById('next-exam-name').textContent = "অভিনন্দন ও শুভকামনা!";
                document.getElementById('exam-status-desc').textContent = "আপনি সকল পরীক্ষা সম্পন্ন করেছেন।";
                liveBadge.classList.add('hidden');
            }

            if (target) {
                const diff = target - now;
                document.getElementById('cd-days').textContent = String(Math.floor(diff/86400000)).padStart(2,'0');
                document.getElementById('cd-hours').textContent = String(Math.floor((diff%86400000)/3600000)).padStart(2,'0');
                document.getElementById('cd-mins').textContent = String(Math.floor((diff%3600000)/60000)).padStart(2,'0');
                document.getElementById('cd-secs').textContent = String(Math.floor((diff%60000)/1000)).padStart(2,'0');
            }
        }

        document.getElementById('searchInput').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            renderTable(routineData.filter(i => i.subject.toLowerCase().includes(val)));
        };

        window.onload = () => {
            renderTable(routineData);
            setInterval(() => {
                updateCountdown();
                if (new Date().getSeconds() === 0) renderTable(routineData);
            }, 1000);
            updateCountdown();
        };
    </script>
</body>
</html>
